<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StreamIMDb</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.07);
    --text: #f0ece4;
    --muted: rgba(240,236,228,0.45);
    --red: #E5091A;
    --red-glow: rgba(229,9,26,0.3);
    --gold: #C9A84C;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
  }

  /* ── Shared utils ── */
  .hidden { display: none !important; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

  /* ═══════════════════════════════════════════════
     SCREEN: MENU
  ═══════════════════════════════════════════════ */
  #screen-menu {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0;
    transition: opacity 0.4s var(--ease-out);
  }
  #screen-menu.visible { opacity: 1; }

  /* Ambient bg — slow color shift driven by focused card */
  #ambient {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 120% 80% at 50% 100%, var(--card-color, #1a1a1a) 0%, var(--bg) 65%);
    transition: background 0.8s var(--ease-out);
    z-index: 0;
    pointer-events: none;
  }

  /* Header */
  header {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 32px 64px 0;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 36px;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  .logo span { color: var(--red); }

  .header-hint {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Hero area — selected movie detail */
  #hero {
    position: relative; z-index: 2;
    padding: 40px 64px 0;
    min-height: 180px;
  }

  .hero-genre {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(48px, 6vw, 80px);
    letter-spacing: 0.02em;
    line-height: 1;
    margin-bottom: 12px;
    transition: opacity 0.25s, transform 0.25s var(--ease-out);
  }

  .hero-meta {
    display: flex; gap: 20px; align-items: center;
    font-size: 13px; color: var(--muted);
    margin-bottom: 14px;
  }

  .hero-rating {
    display: flex; align-items: center; gap: 6px;
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 4px;
    padding: 3px 10px;
    color: var(--gold);
    font-weight: 500;
    font-size: 13px;
  }

  .hero-synopsis {
    font-size: 14px;
    line-height: 1.65;
    color: var(--muted);
    max-width: 560px;
    opacity: 0;
    transition: opacity 0.3s 0.1s;
  }
  .hero-synopsis.loaded { opacity: 1; }

  /* ── Carousel ── */
  #carousel-section {
    position: relative; z-index: 2;
    margin-top: auto;
    padding: 0 64px 48px;
  }

  .carousel-label {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  #carousel {
    display: flex;
    gap: 20px;
    overflow: visible;
  }

  .movie-card {
    flex: 0 0 200px;
    height: 300px;
    border-radius: 8px;
    position: relative;
    cursor: pointer;
    transition: transform 0.35s var(--ease-out), box-shadow 0.35s var(--ease-out);
    overflow: hidden;
    outline: none;
  }

  .movie-card:focus { outline: none; }

  /* Colored poster placeholder */
  .card-poster {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
  }

  .card-poster-initial {
    font-family: var(--font-display);
    font-size: 72px;
    opacity: 0.18;
    line-height: 1;
    color: #fff;
  }

  .card-gradient {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  }

  .card-title-label {
    position: absolute; bottom: 14px; left: 14px; right: 14px;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: 0.01em;
  }

  .card-year-label {
    position: absolute; top: 12px; right: 12px;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.05em;
  }

  /* Focused card */
  .movie-card.focused {
    transform: scale(1.08) translateY(-8px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 2px var(--red);
  }

  /* Play hint */
  .play-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0);
    transition: background 0.25s;
  }
  .movie-card.focused .play-hint { background: rgba(0,0,0,0.15); }

  .play-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--red);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.25s, transform 0.25s var(--ease-out);
  }
  .play-icon svg { width: 20px; height: 20px; fill: #fff; }
  .movie-card.focused .play-icon {
    opacity: 1;
    transform: scale(1);
  }

  /* Nav arrows */
  .nav-arrows {
    display: flex; gap: 8px;
    margin-bottom: 16px;
  }
  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .nav-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); background: var(--surface2); }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }

  /* Key legend */
  .key-legend {
    display: flex; gap: 20px; margin-top: 20px;
  }
  .key-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--muted);
  }
  .key-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-family: monospace;
    color: var(--text);
  }

  /* ═══════════════════════════════════════════════
     SCREEN: LOADING
  ═══════════════════════════════════════════════ */
  #screen-loading {
    position: fixed; inset: 0; z-index: 20;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #screen-loading.visible { opacity: 1; pointer-events: auto; }

  .loading-title {
    font-family: var(--font-display);
    font-size: 48px;
    letter-spacing: 0.04em;
    color: var(--red);
  }

  .loading-sub {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .loader-bar {
    width: 280px; height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-bar-fill {
    height: 100%;
    background: var(--red);
    width: 0%;
    border-radius: 2px;
    transition: width 1.5s var(--ease-out);
  }

  /* ═══════════════════════════════════════════════
     SCREEN: PLAYER
  ═══════════════════════════════════════════════ */
  #screen-player {
    position: fixed; inset: 0; z-index: 30;
    background: #000;
    display: flex; flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s;
  }
  #screen-player.visible { opacity: 1; pointer-events: auto; }

  #player-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    background: #000;
  }

  /* Player overlay controls */
  #player-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 32px 48px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 28%, transparent 68%, rgba(0,0,0,0.85) 100%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  #screen-player:hover #player-overlay,
  #screen-player.show-controls #player-overlay { opacity: 1; }

  .player-top {
    display: flex; align-items: flex-start; justify-content: space-between;
  }

  #player-title-display {
    font-family: var(--font-display);
    font-size: 36px;
    letter-spacing: 0.03em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.8);
  }

  .player-back-btn {
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-family: var(--font-body);
    font-size: 13px;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: background 0.2s;
  }
  .player-back-btn:hover { background: rgba(255,255,255,0.1); }

  .player-bottom { display: flex; flex-direction: column; gap: 12px; }

  /* Seek bar */
  #seek-bar {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    cursor: pointer;
    accent-color: var(--red);
  }
  #seek-bar::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--red);
    cursor: pointer;
  }

  .player-controls-row {
    display: flex; align-items: center; gap: 16px;
  }

  .ctrl-btn {
    background: none; border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    opacity: 0.85;
    transition: opacity 0.2s, transform 0.15s;
    line-height: 1;
    padding: 4px;
  }
  .ctrl-btn:hover { opacity: 1; transform: scale(1.1); }

  #time-display {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums;
    margin-left: 4px;
  }

  .ctrl-spacer { flex: 1; }

  #volume-slider {
    width: 80px;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    accent-color: #fff;
    cursor: pointer;
  }

  /* Error toast */
  #toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1a0a0a;
    border: 1px solid var(--red);
    border-radius: 6px;
    padding: 12px 24px;
    font-size: 13px;
    color: var(--text);
    z-index: 100;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<h1 class="sr-only">StreamIMDb TV Application</h1>

<!-- ── MENU SCREEN ── -->
<div id="screen-menu">
  <div id="ambient"></div>

  <header>
    <div class="logo">Stream<span>IMDb</span></div>
    <div class="header-hint">Use ← → to browse · Enter to play · Esc to back</div>
  </header>

  <div id="hero">
    <div class="hero-genre" id="hero-genre">Action · Crime · Drama</div>
    <div class="hero-title" id="hero-title">The Dark Knight</div>
    <div class="hero-meta">
      <div class="hero-rating">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span id="hero-rating">9.0</span>
      </div>
      <span id="hero-year">2008</span>
      <span id="hero-runtime">2h 32m</span>
      <span id="hero-director"></span>
    </div>
    <div class="hero-synopsis" id="hero-synopsis"></div>
  </div>

  <div id="carousel-section">
    <div class="nav-arrows">
      <button class="nav-btn" id="btn-left" aria-label="Previous" onclick="navigate(-1)">&#8592;</button>
      <button class="nav-btn" id="btn-right" aria-label="Next" onclick="navigate(1)">&#8594;</button>
    </div>
    <div class="carousel-label">Featured Films</div>
    <div id="carousel" role="listbox" aria-label="Movie selection"></div>
    <div class="key-legend">
      <div class="key-item"><span class="key-badge">← →</span> Browse</div>
      <div class="key-item"><span class="key-badge">Enter</span> Play</div>
      <div class="key-item"><span class="key-badge">Esc</span> Back / Quit</div>
    </div>
  </div>
</div>

<!-- ── LOADING SCREEN ── -->
<div id="screen-loading">
  <div class="loading-title" id="loading-title">Loading</div>
  <div class="loading-sub" id="loading-sub">Resolving stream...</div>
  <div class="loader-bar"><div class="loader-bar-fill" id="loader-fill"></div></div>
</div>

<!-- ── PLAYER SCREEN ── -->
<div id="screen-player">
  <video id="player-video" preload="auto"></video>

  <div id="player-overlay">
    <div class="player-top">
      <div id="player-title-display">Title</div>
      <button class="player-back-btn" onclick="goBack()">&#8592; Back</button>
    </div>

    <div class="player-bottom">
      <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1" aria-label="Seek" />
      <div class="player-controls-row">
        <button class="ctrl-btn" id="btn-play-pause" onclick="togglePlayPause()" aria-label="Play/Pause">&#9654;</button>
        <button class="ctrl-btn" onclick="skip(-10)" aria-label="Rewind 10s" title="−10s">&#8635;</button>
        <button class="ctrl-btn" onclick="skip(10)"  aria-label="Forward 10s" title="+10s">&#8634;</button>
        <span id="time-display">0:00 / 0:00</span>
        <span class="ctrl-spacer"></span>
        <button class="ctrl-btn" onclick="toggleMute()" id="btn-mute" aria-label="Mute">&#128266;</button>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" aria-label="Volume" />
        <button class="ctrl-btn" onclick="toggleFullscreen()" aria-label="Fullscreen">&#9974;</button>
      </div>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div id="toast" role="alert" aria-live="polite"></div>

<script>
/* ─── Config ─────────────────────────────────────────────────── */
const API_BASE = "http://localhost:3000/api";

/* ─── State ──────────────────────────────────────────────────── */
let movies = [];
let focusIndex = 0;
let hlsInstance = null;
let controlsHideTimer = null;

/* ─── DOM refs ────────────────────────────────────────────────── */
const $ = (id) => document.getElementById(id);
const screenMenu    = $("screen-menu");
const screenLoading = $("screen-loading");
const screenPlayer  = $("screen-player");
const carousel      = $("carousel");
const ambient       = $("ambient");
const video         = $("player-video");
const seekBar       = $("seek-bar");
const timeDis       = $("time-display");
const loaderFill    = $("loader-fill");

/* ─── Init ────────────────────────────────────────────────────── */
async function init() {
  try {
    const res = await fetch(`${API_BASE}/movies`);
    const data = await res.json();
    movies = data.movies;
  } catch {
    // Fallback hardcoded catalogue if backend isn't running
    movies = [
      { imdbId:"tt0468569", title:"The Dark Knight",  year:2008, rating:9.0, genre:["Action","Crime"],   director:"Christopher Nolan",   runtime:152, synopsis:"When the menace known as the Joker wreaks havoc on Gotham, Batman must accept the greatest test of his ability to fight injustice.", posterColor:"#1E2840", accentColor:"#E59320" },
      { imdbId:"tt1375666", title:"Inception",         year:2010, rating:8.8, genre:["Sci-Fi","Action"],  director:"Christopher Nolan",   runtime:148, synopsis:"A thief who steals corporate secrets via dream-sharing is given the inverse task of planting an idea into a CEO's mind.",          posterColor:"#1A3020", accentColor:"#4CAF50" },
      { imdbId:"tt0816692", title:"Interstellar",      year:2014, rating:8.7, genre:["Sci-Fi","Drama"],   director:"Christopher Nolan",   runtime:169, synopsis:"A team of explorers travel through a wormhole in space in an attempt to ensure humanity's survival.",                            posterColor:"#2A1010", accentColor:"#FF6B35" },
      { imdbId:"tt0110912", title:"Pulp Fiction",      year:1994, rating:8.9, genre:["Crime","Drama"],    director:"Quentin Tarantino",   runtime:154, synopsis:"The lives of two mob hitmen, a boxer, a gangster's wife, and diner bandits intertwine in four tales of violence and redemption.", posterColor:"#2A2010", accentColor:"#FFD700" },
      { imdbId:"tt0137523", title:"Fight Club",        year:1999, rating:8.8, genre:["Drama"],            director:"David Fincher",       runtime:139, synopsis:"An insomniac office worker and a devil-may-care soap maker form an underground fight club that evolves into much more.",           posterColor:"#1C1010", accentColor:"#CC3300" },
      { imdbId:"tt0133093", title:"The Matrix",        year:1999, rating:8.7, genre:["Action","Sci-Fi"],  director:"Lana Wachowski",      runtime:136, synopsis:"A computer hacker learns about the true nature of his reality and his role in the war against its controllers.",                  posterColor:"#0A1A0A", accentColor:"#00FF41" },
    ];
    showToast("Backend offline — using local catalogue");
  }

  buildCarousel();
  updateHero();
  screenMenu.classList.add("visible");
}

/* ─── Carousel ────────────────────────────────────────────────── */
function buildCarousel() {
  carousel.innerHTML = "";
  movies.forEach((m, i) => {
    const initials = m.title.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
    const card = document.createElement("div");
    card.className = "movie-card" + (i === focusIndex ? " focused" : "");
    card.setAttribute("role", "option");
    card.setAttribute("aria-selected", i === focusIndex ? "true" : "false");
    card.setAttribute("tabindex", i === 0 ? "0" : "-1");
    card.setAttribute("data-index", i);
    card.style.background = m.posterColor;
    card.innerHTML = `
      <div class="card-poster">
        <div class="card-poster-initial">${initials}</div>
      </div>
      <div class="card-gradient"></div>
      <div class="card-year-label">${m.year}</div>
      <div class="card-title-label">${m.title}</div>
      <div class="play-hint">
        <div class="play-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
    `;
    card.addEventListener("click", () => { focusIndex = i; updateFocus(); selectMovie(); });
    card.addEventListener("mouseover", () => { focusIndex = i; updateFocus(); });
    carousel.appendChild(card);
  });
}

function updateFocus() {
  const cards = carousel.querySelectorAll(".movie-card");
  cards.forEach((c, i) => {
    c.classList.toggle("focused", i === focusIndex);
    c.setAttribute("aria-selected", i === focusIndex ? "true" : "false");
    c.setAttribute("tabindex", i === focusIndex ? "0" : "-1");
  });
  updateHero();
  $("btn-left").disabled  = focusIndex === 0;
  $("btn-right").disabled = focusIndex === movies.length - 1;

  // Scroll focused card into view
  cards[focusIndex]?.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
}

function navigate(dir) {
  const next = focusIndex + dir;
  if (next < 0 || next >= movies.length) return;
  focusIndex = next;
  updateFocus();
}

/* ─── Hero ─────────────────────────────────────────────────────── */
function updateHero() {
  const m = movies[focusIndex];
  if (!m) return;

  $("hero-genre").textContent   = m.genre.join(" · ");
  $("hero-title").textContent   = m.title;
  $("hero-rating").textContent  = m.rating.toFixed(1);
  $("hero-year").textContent    = m.year;
  $("hero-runtime").textContent = formatRuntime(m.runtime);
  $("hero-director").textContent = "Dir. " + m.director;

  const syn = $("hero-synopsis");
  syn.classList.remove("loaded");
  syn.textContent = m.synopsis;
  requestAnimationFrame(() => syn.classList.add("loaded"));

  // Update ambient background to poster color
  ambient.style.setProperty("--card-color", m.posterColor + "88");
  ambient.style.background = `radial-gradient(ellipse 130% 90% at 50% 105%, ${m.posterColor}66 0%, var(--bg) 60%)`;
}

function formatRuntime(min) {
  return `${Math.floor(min / 60)}h ${min % 60}m`;
}

/* ─── Playback ──────────────────────────────────────────────────── */
async function selectMovie() {
  const m = movies[focusIndex];
  showScreen("loading");
  $("loading-title").textContent = m.title;
  $("loading-sub").textContent   = "Resolving stream...";

  // Animate the loader bar
  setTimeout(() => { loaderFill.style.width = "70%"; }, 50);

  let streamUrl;
  try {
    const res  = await fetch(`${API_BASE}/stream/${m.imdbId}`);
    const data = await res.json();
    streamUrl  = data.streamUrl;
  } catch {
    // Fallback if backend is down
    streamUrl = "https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8";
  }

  loaderFill.style.width = "100%";
  $("loading-sub").textContent = "Buffering...";

  // Small delay so the bar visually completes
  setTimeout(() => startPlayback(m, streamUrl), 600);
}

function startPlayback(movie, streamUrl) {
  $("player-title-display").textContent = movie.title;
  showScreen("player");

  // Destroy previous HLS instance if any
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  if (Hls.isSupported()) {
    hlsInstance = new Hls({ startLevel: -1 });
    hlsInstance.loadSource(streamUrl);
    hlsInstance.attachMedia(video);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(() => {}); });
    hlsInstance.on(Hls.Events.ERROR, (_e, data) => {
      if (data.fatal) showToast("Stream error: " + data.type);
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = streamUrl;
    video.play().catch(() => {});
  } else {
    showToast("HLS not supported in this browser.");
    goBack();
    return;
  }

  resetControls();
  video.focus();
}

function stopPlayback() {
  video.pause();
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  video.src = "";
}

function goBack() {
  stopPlayback();
  loaderFill.style.width = "0%";
  showScreen("menu");
}

/* ─── Player controls ───────────────────────────────────────────── */
function resetControls() {
  seekBar.value = 0;
  $("btn-play-pause").innerHTML = "&#9646;&#9646;";
}

function togglePlayPause() {
  if (video.paused) { video.play(); $("btn-play-pause").innerHTML = "&#9646;&#9646;"; }
  else              { video.pause(); $("btn-play-pause").innerHTML = "&#9654;"; }
  flashControls();
}

function skip(sec) {
  video.currentTime = Math.max(0, Math.min(video.duration || 0, video.currentTime + sec));
  flashControls();
}

function toggleMute() {
  video.muted = !video.muted;
  $("btn-mute").innerHTML = video.muted ? "&#128263;" : "&#128266;";
}

function toggleFullscreen() {
  if (!document.fullscreenElement) screenPlayer.requestFullscreen().catch(() => {});
  else document.exitFullscreen().catch(() => {});
}

function flashControls() {
  screenPlayer.classList.add("show-controls");
  clearTimeout(controlsHideTimer);
  controlsHideTimer = setTimeout(() => screenPlayer.classList.remove("show-controls"), 2800);
}

function formatTime(sec) {
  if (!isFinite(sec)) return "0:00";
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}

video.addEventListener("timeupdate", () => {
  if (!video.duration) return;
  seekBar.value = (video.currentTime / video.duration) * 100;
  timeDis.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
});

video.addEventListener("ended", () => {
  $("btn-play-pause").innerHTML = "&#9654;";
  flashControls();
});

seekBar.addEventListener("input", () => {
  if (video.duration) video.currentTime = (seekBar.value / 100) * video.duration;
});

$("volume-slider").addEventListener("input", (e) => {
  video.volume = e.target.value;
  video.muted  = false;
  $("btn-mute").innerHTML = "&#128266;";
});

screenPlayer.addEventListener("mousemove", flashControls);
screenPlayer.addEventListener("click", flashControls);

/* ─── Screen management ─────────────────────────────────────────── */
function showScreen(name) {
  screenMenu.classList.toggle("visible",    name === "menu");
  screenLoading.classList.toggle("visible", name === "loading");
  screenPlayer.classList.toggle("visible",  name === "player");
}

/* ─── Keyboard ──────────────────────────────────────────────────── */
document.addEventListener("keydown", (e) => {
  const inMenu   = screenMenu.classList.contains("visible");
  const inPlayer = screenPlayer.classList.contains("visible");

  if (inMenu) {
    if (e.key === "ArrowRight") { e.preventDefault(); navigate(1); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); navigate(-1); }
    if (e.key === "Enter")      { e.preventDefault(); selectMovie(); }
    if (e.key === "Escape")     { window.close(); }
  }

  if (inPlayer) {
    if (e.key === "Escape" || e.key === "Backspace") { e.preventDefault(); goBack(); }
    if (e.key === " ")          { e.preventDefault(); togglePlayPause(); }
    if (e.key === "ArrowRight") { e.preventDefault(); skip(10); }
    if (e.key === "ArrowLeft")  { e.preventDefault(); skip(-10); }
    if (e.key === "m" || e.key === "M") toggleMute();
    if (e.key === "f" || e.key === "F") toggleFullscreen();
    flashControls();
  }
});

/* ─── Toast ─────────────────────────────────────────────────────── */
let toastTimer;
function showToast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 4000);
}

/* ─── Boot ──────────────────────────────────────────────────────── */
init();
</script>
</body>
</html>
